
  #ingress/home_middleware.yaml
  # ========================
  apiVersion: traefik.io/v1alpha1
  kind: Middleware
  metadata:
    name: strip-home-prefix
    namespace: devops-demo
  spec:
    stripPrefix:
      prefixes:
        - /home
  
---

  #ingress/payment_middleware.yaml
  apiVersion: traefik.io/v1alpha1
  kind: Middleware
  metadata:
    name: strip-payment-prefix
    namespace: app-demo
  spec:
    stripPrefix:
      prefixes:
        - /payment

---

  #ingress/home_ingress.yaml
  # ========================
  apiVersion: traefik.io/v1alpha1
  kind: IngressRoute
  metadata:
    name: home-ingress
    namespace: devops-demo
  spec:
    entryPoints:
      - web
    routes:
    - match: Host(`deena.work.gd`) && PathPrefix(`/home`)
      kind: Rule
      services:
      - name: nginx-service
        port: 80
      middlewares:
      - name: strip-home-prefix

---

  #ingress/payment_ingress.yaml
  #=============================
  apiVersion: traefik.io/v1alpha1
  kind: IngressRoute
  metadata:
    name: payment-ingress
    namespace: app-demo
  spec:
    entryPoints:
      - web
    routes:
    - match: Host(`deena.work.gd`) && PathPrefix(`/payment`)
      kind: Rule
      services:
      - name: apache-service
        port: 80
      middlewares:
      - name: strip-payment-prefix


---

  #services/home_service.yaml
  apiVersion: v1
  kind: Service
  metadata:
    name: nginx-service
    namespace: devops-demo
  spec:
    selector:
      app: nginx
    ports:
    - port: 80
      targetPort: 80
    type: ClusterIP
---
  #services/payment_service.yaml
  apiVersion: v1
  kind: Service
  metadata:
    name: apache-service
    namespace: app-demo
  spec:
    selector:
      app: apache
    ports:
    - port: 80
      targetPort: 80
    type: ClusterIP


---
  #deployment/home_deployment.yaml
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: nginx-deployment
    namespace: devops-demo
  spec:
    replicas: 3
    selector:
      matchLabels:
        app: nginx
    template:
      metadata:
        labels:
          app: nginx
      spec:
        containers:
        - name: nginx
          image: nginx
          ports:
          - containerPort: 80
  
---


  #deployment/payment_deployment.yaml
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: apache-deployment
    namespace: app-demo
  spec:
    replicas: 2
    selector:
      matchLabels:
        app: apache
    template:
      metadata:
        labels:
          app: apache
      spec:
        containers:
        - name: apache
          image: httpd
          ports:
          - containerPort: 80

