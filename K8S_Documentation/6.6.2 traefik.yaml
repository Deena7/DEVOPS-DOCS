#Without Middleware:
#User requests: deena.work.gd/home
#Traefik sends the path /home straight into the NGINX container.
#NGINX looks for a folder named /home inside its system.
#It doesn't exist $\rightarrow$ 404 Not Found.

#With Middleware (StripPrefix):
#User requests: deena.work.gd/home
#Traefik intercepts it and applies the middleware.
#The middleware slices off /home and changes the path to /.Traefik sends / to the NGINX container.
#NGINX sees the / and happily serves its main default welcome page (which is exactly what you saw work successfully!).

