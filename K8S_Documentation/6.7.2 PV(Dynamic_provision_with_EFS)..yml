apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: efs-sc
provisioner: efs.csi.aws.com
parameters:
  provisioningMode: efs-ap
  fileSystemId: fs-0ce3dbbce8268331b # Replace with your EFS ID
  directoryPerms: "700"
reclaimPolicy: Delete # Dynamically provisioned PVs will delete EFS access points when PVC is deleted
volumeBindingMode: Immediate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: efs-pvc
spec:
  accessModes:
    - ReadWriteMany # EFS supports multi-node read/write
  storageClassName: efs-sc
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dynamic-nginx
spec:
  replicas: 5 # Testing ReadWriteMany across replicas
  selector:
    matchLabels:
      app: dynamic-web
  template:
    metadata:
      labels:
        app: dynamic-web
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: efs-storage
              mountPath: /usr/share/nginx/html
      volumes:
        - name: efs-storage
          persistentVolumeClaim:
            claimName: efs-pvc

