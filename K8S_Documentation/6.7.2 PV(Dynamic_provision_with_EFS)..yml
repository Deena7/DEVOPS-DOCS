REQUIREMENTS:
#1)EC2 MECHINE WITH ROLE(AMAZONEFSCSIDRIVERPOLICY)
#2)EFS SERVICE WITH SAME VPC RUNNING ON EC2 AND EFS FILE SYSTEM SECURITY GROUP WITH NFS PROTOCOL
#3)INSIDE EC2 SERVICE INSTALL AWS-EFS-DRIVER IN K3S SERVER(COMMENDS BELOW)(if not works install nfs-common package inside mechine)

