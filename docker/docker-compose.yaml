8.2  Restart Policies
Policy
Behavior
no
Never restart automatically (default)
always
Always restart regardless of exit code
on-failure
Restart only if exit code is non-zero
on-failure:3
Restart on failure, up to 3 times
unless-stopped
Always restart unless manually stopped (recommended for production)


