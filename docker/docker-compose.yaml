12.2  Logging Drivers
Docker supports multiple logging drivers that determine how container logs are stored and forwarded.

Driver
Description & Use Case
json-file
Default. Stores logs as JSON on disk. Supports docker logs command.
syslog
Sends logs to syslog daemon on host. System-level integration.
journald
Sends logs to systemd journal. Linux hosts with systemd.
fluentd
Sends logs to Fluentd log aggregator. Production centralized logging.
awslogs
Sends logs to AWS CloudWatch Logs. AWS deployments.
gelf
Graylog Extended Log Format. Centralized logging with Graylog/Logstash.
splunk
Sends to Splunk HTTP Event Collector. Enterprise logging.
none
Disables all logging. Used for containers producing massive log output.


# Set logging driver for a container
