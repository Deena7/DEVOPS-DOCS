PHASE 3
DAY 14
Docker Storage & Optimization


14.1  Storage Drivers
Docker uses storage drivers to manage how image layers and container writable layers are stored. The storage driver handles how these layers interact.

Driver
Description
overlay2
Default for modern Linux. Best performance. Recommended for production.
devicemapper
Used on older RHEL/CentOS. Being deprecated.
btrfs / zfs
Advanced filesystem features (snapshotting). Requires btrfs/zfs filesystem.
vfs
No copy-on-write. Each layer is a full copy. Only for testing.


14.2  Backup & Restore
# Backup a Docker volume
docker run --rm \
  -v mydata:/data \
  -v $(pwd):/backup \
  ubuntu \
  tar czf /backup/mydata-backup.tar.gz -C /data .

# Restore a Docker volume from backup
docker run --rm \
  -v mydata:/data \
  -v $(pwd):/backup \
  ubuntu \
  tar xzf /backup/mydata-backup.tar.gz -C /data

# Export container filesystem as tar
docker export my-container > container-backup.tar

# Save Docker image as tar archive
docker save myapp:1.0 | gzip > myapp-1.0.tar.gz

# Load image from archive
gunzip -c myapp-1.0.tar.gz | docker load


14.3  Build Optimization Techniques
# ── Optimized Dockerfile patterns ──

# 1. Order layers: least-changed to most-changed
FROM node:20-alpine
WORKDIR /app
COPY package*.json ./       # Changes rarely — cached most builds
RUN npm ci --only=production
COPY src/ ./src/            # Changes often — only invalidates last layer

# 2. Combine RUN commands to reduce layers
RUN apt-get update \
  && apt-get install -y --no-install-recommends \
     git curl wget \
  && rm -rf /var/lib/apt/lists/*

# 3. Use BuildKit for parallel builds
DOCKER_BUILDKIT=1 docker build -t myapp .

# 4. Enable inline cache metadata
FROM --platform=$BUILDPLATFORM node:20 AS builder

# 5. squash layers (requires experimental flag)
docker build --squash -t myapp .

# Check image layer sizes
docker image history myapp:latest
docker image inspect myapp:latest --format='{{.Size}}'

