9.3  Image Tagging Strategy
semantic: myapp:1.0.0, myapp:1.0, myapp:1 — follow SemVer for releases
latest: Always points to the most recent stable release — NEVER use latest in production
git sha: myapp:a1b2c3d — pin to exact commit for reproducibility
environment: myapp:prod, myapp:staging — environment-specific builds
date: myapp:2024-01-15 — useful for nightly builds

Best Practice
In production, always pin to a specific version tag (myapp:1.2.3) never 'latest'. This ensures reproducible deployments and avoids unexpected breaking changes.



PHASE 2
DAY 10
Docker Security & Best Practices


10.1  Container Security Principles
Principle of Least Privilege: Containers should have only the permissions they need
Immutability: Treat containers as immutable — never modify running containers
Minimal Base Images: Use slim/alpine/distroless images to reduce attack surface
No Secrets in Images: Never bake passwords or API keys into images
Regular Updates: Keep base images patched and updated
Image Scanning: Scan images for CVEs before deployment

10.2  Running as Non-Root
# In Dockerfile — create and switch to non-root user
FROM python:3.11-slim

# Create group and user
RUN groupadd -r appgroup && useradd -r -g appgroup -s /bin/false appuser

WORKDIR /app
COPY --chown=appuser:appgroup . .

# Switch to non-root user
USER appuser

CMD ["python", "app.py"]

# ── Verify at runtime ──
docker run myapp whoami    # Should print: appuser

# Prevent privilege escalation
docker run --security-opt=no-new-privileges myapp


10.3  Secrets Management
# BAD — Never do this!
docker run -e DB_PASSWORD=supersecret myapp
ENV DB_PASSWORD=supersecret    # In Dockerfile — baked into image!

# GOOD — Docker Secrets (Swarm mode)
echo 'mysecretpassword' | docker secret create db_password -
docker service create \
  --secret db_password \
  --name myapp myapp:1.0
# Secret available at /run/secrets/db_password inside container

# GOOD — Docker Compose Secrets
# docker-compose.yml
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password

secrets:
  db_password:
    file: ./secrets/db_password.txt


