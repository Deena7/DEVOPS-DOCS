15.1  Project: Containerized Full-Stack Application
In this capstone project, you will containerize a complete 3-tier web application: React frontend, Node.js/Express API, and PostgreSQL database. The stack will be orchestrated with Docker Compose and follow all production best practices.

Project Architecture
React Frontend (port 3000)  →  Nginx Reverse Proxy (port 80)  →  Node.js API (port 5000)  →  PostgreSQL Database (port 5432)All connected via dedicated Docker networks with persistent volumes for data.


