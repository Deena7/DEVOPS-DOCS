scripts/seed.py
-----------------
import psycopg2
#import time

print("--- Starting Postgres Seeder Script ---")
#time.sleep(5) # Gives Postgres a brief moment to finish warming up

try:
    conn = psycopg2.connect(
        host="db",
        database="mystore",
        user="adminuser",
        password="supersecretpassword"
    )
    cursor = conn.cursor()

    # 1. Create a simple table
    cursor.execute('''
        CREATE TABLE IF NOT EXISTS classmates (
            id SERIAL PRIMARY KEY,
            name VARCHAR(50),
            hobby VARCHAR(50)
        );
    ''')

    # 2. Clear old data out so we don't double the rows if run twice
    cursor.execute("TRUNCATE TABLE classmates;")

    # 3. Insert simple mock data rows
    mock_data = [
        ("Alice", "Coding"),
        ("Bob", "Cybersecurity"),
        ("Charlie", "Gaming")
    ]

    for name, hobby in mock_data:
        cursor.execute("INSERT INTO classmates (name, hobby) VALUES (%s, %s)", (name, hobby))
    
    conn.commit()
    print("Success! Seeded 3 classmates into your Postgres Database.")
    print("--- Seeder Script Finished ---")

except Exception as e:
    print("Seeding failed error:", e)
finally:
    if 'conn' in locals():
        cursor.close()
        conn.close()


