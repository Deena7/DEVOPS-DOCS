15.8  Deployment Commands
# ── Development ──
docker compose up --build           # Build and start (with dev overrides)
docker compose logs -f              # Follow all logs
docker compose exec api bash        # Shell into API
docker compose exec db psql -U admin myapp  # Database shell

# ── Production ──
docker compose -f docker-compose.yml up -d --build  # No override file

# ── Maintenance ──
docker compose ps                   # Check service status
docker compose restart api          # Restart one service
docker compose pull && docker compose up -d  # Update to latest images

# ── Teardown ──
docker compose down                 # Stop, keep volumes
docker compose down -v              # Stop AND delete data (careful!)

# ── Healthcheck verification ──
docker inspect --format='{{.State.Health.Status}}' <container>


