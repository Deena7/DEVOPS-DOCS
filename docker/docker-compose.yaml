13.1  Custom Bridge Networks Deep Dive
Custom bridge networks provide better isolation than the default bridge, support automatic DNS resolution by container name, and allow fine-grained control over connectivity.
# Create custom bridge network with full options
docker network create \
  --driver bridge \
  --subnet 192.168.100.0/24 \
  --gateway 192.168.100.1 \
  --ip-range 192.168.100.128/25 \
  --opt com.docker.network.bridge.name=br-app \
  app-network

# Assign static IP to container
docker run -d \
  --network app-network \
  --ip 192.168.100.10 \
  --name db \
  postgres:15

# Containers on same custom bridge can communicate by name
docker run -d --network app-network --name api myapi

# api container can reach db via: http://db:5432
# (default bridge does NOT support DNS by container name)


