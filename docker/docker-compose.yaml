Docker in CI/CD


11.1  Docker in Jenkins Pipelines
Docker integrates naturally into CI/CD pipelines. Jenkins can use Docker to create clean, reproducible build environments and produce deployable container images as pipeline artifacts.

Jenkinsfile — Basic Docker Pipeline
// Jenkinsfile — Pipeline as Code
pipeline {
  agent any

  environment {
    IMAGE_NAME = 'myapp'
    IMAGE_TAG  = "${env.BUILD_NUMBER}"
    REGISTRY   = 'registry.example.com'
  }

  stages {

    stage('Checkout') {
      steps {
        git branch: 'main', url: 'https://github.com/org/repo.git'
      }
    }

    stage('Build Image') {
      steps {
        script {
          // Build Docker image
          sh 'docker build -t ${IMAGE_NAME}:${IMAGE_TAG} .'
          sh 'docker tag ${IMAGE_NAME}:${IMAGE_TAG} ${IMAGE_NAME}:latest'
        }
      }
    }

    stage('Run Tests') {
      steps {
        script {
          // Run tests inside container, auto-removed after
          sh '''
            docker run --rm \
              -e CI=true \
              ${IMAGE_NAME}:${IMAGE_TAG} \
              npm test
          '''
        }
      }
    }

    stage('Push to Registry') {
      steps {
        withCredentials([usernamePassword(credentialsId: 'docker-hub',
                         usernameVariable: 'USER', passwordVariable: 'PASS')]) {
          sh 'echo $PASS | docker login -u $USER --password-stdin ${REGISTRY}'
          sh 'docker push ${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}'
          sh 'docker push ${REGISTRY}/${IMAGE_NAME}:latest'
        }
      }
    }

    stage('Cleanup') {
      steps {
        sh 'docker rmi ${IMAGE_NAME}:${IMAGE_TAG} || true'
        sh 'docker system prune -f'
      }
    }
  }
}


11.2  Docker Layer Caching in CI
# Optimize builds with layer caching

# Pull cached image from registry before building
docker pull myapp:latest || true

# Build with cache from pulled image
docker build \
  --cache-from myapp:latest \
  --build-arg BUILDKIT_INLINE_CACHE=1 \
  -t myapp:${BUILD_NUMBER} \
  -t myapp:latest \
  .

# Using BuildKit (recommended — parallel builds, better caching)
DOCKER_BUILDKIT=1 docker build \
  --cache-from type=registry,ref=myregistry/myapp:cache \
  --cache-to type=registry,ref=myregistry/myapp:cache,mode=max \
  -t myregistry/myapp:latest .



